<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crotin.github.io</title>
<style>
  :root{
    --radius: 14px;
  }

  html[data-theme="light"]{
    --bg: #ffffff;
    --bg-alt: #f2f5fc;
    --surface: #ffffff;
    --border: #e1e7f5;
    --primary: #2456d6;
    --primary-soft: #eaf0ff;
    --primary-strong: #163fae;
    --text: #101623;
    --muted: #66708a;
    --shadow: 0 14px 34px -18px rgba(36,86,214,0.28);
  }

  html[data-theme="dark"]{
    --bg: #05070d;
    --bg-alt: #0a0e18;
    --surface: #0e1220;
    --border: #1c2338;
    --primary: #5b8dff;
    --primary-soft: #142145;
    --primary-strong: #8fb0ff;
    --text: #eef1fb;
    --muted: #8791ac;
    --shadow: 0 14px 34px -16px rgba(91,141,255,0.35);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    transition: background .3s ease, color .3s ease;
  }

  /* ---------- HEADER ---------- */
  header{
    padding: 32px 6vw 22px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap: 20px;
    flex-wrap: wrap;
    transition: background .3s ease, border-color .3s ease;
  }

  .brand h1{
    margin:0;
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: .5px;
    color: var(--primary);
  }

  .brand .tagline{
    color: var(--muted);
    font-size: 12.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .subhead{
    margin-top: 8px;
    color: var(--muted);
    font-size: 13.5px;
    max-width: 520px;
    line-height: 1.5;
  }

  .controls{
    display:flex;
    align-items:center;
    gap: 12px;
  }

  .theme-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    background: var(--bg-alt);
    border: 1px solid var(--border);
    padding: 6px 14px 6px 6px;
    border-radius: 999px;
    cursor:pointer;
    font-size: 13px;
    color: var(--text);
    transition: background .2s ease;
  }
  .theme-toggle:hover{ background: var(--primary-soft); }

  .theme-toggle .dot{
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--primary);
    display:flex; align-items:center; justify-content:center;
    font-size: 14px;
    color: #fff;
    transition: transform .3s ease;
  }

  /* ---------- PAGINATION ---------- */
  .pagination{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    margin-top: 36px;
    flex-wrap: wrap;
  }

  .page-btn{
    min-width: 38px;
    height: 38px;
    padding: 0 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s ease, border-color .2s ease, color .2s ease;
  }

  .page-btn:hover:not(:disabled){
    border-color: var(--primary);
    color: var(--primary);
  }

  .page-btn.active{
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .page-btn:disabled{
    opacity: .4;
    cursor: not-allowed;
  }

  /* ---------- GRID ---------- */
  main{
    padding: 36px 6vw 80px;
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 26px;
  }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
  }

  .card:hover{
    transform: translateY(-5px);
    border-color: var(--primary);
    box-shadow: var(--shadow);
  }

  .poster{
    position: relative;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
  }

  .poster::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      repeating-linear-gradient(115deg, rgba(255,255,255,0.08) 0 2px, transparent 2px 26px);
  }

  .poster.has-cover::before{
    display:none;
  }

  .poster img{
    position:relative;
    width:100%;
    height:100%;
    object-fit: cover;
    display:block;
  }

  .poster .initials{
    position: relative;
    color: #fff;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 0 4px 18px rgba(0,0,0,0.25);
  }

  .play-hint{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background: rgba(10,15,30,0.28);
    opacity:0;
    transition: opacity .25s ease;
  }
  .card:hover .play-hint{ opacity:1; }

  .play-hint span{
    width:52px; height:52px;
    border-radius:50%;
    background: rgba(255,255,255,0.16);
    border: 1.5px solid #fff;
    display:flex;align-items:center;justify-content:center;
    color: #fff;
    font-size: 18px;
    backdrop-filter: blur(3px);
  }

  .info{
    padding: 16px 16px 18px;
    display:flex;
    flex-direction:column;
    gap: 9px;
    flex:1;
  }

  .info h3{
    margin:0;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .meta-row{
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.5;
  }

  .meta-row b{
    color: var(--primary);
    font-weight: 600;
  }

  .tags{
    display:flex;
    flex-wrap:wrap;
    gap: 6px;
  }

  .tag{
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--primary-soft);
    border: 1px solid var(--border);
    color: var(--primary);
    cursor: pointer;
    transition: background .2s ease, color .2s ease, transform .15s ease;
  }

  .tag:hover{
    background: var(--primary);
    color: #fff;
    transform: translateY(-1px);
  }

  .tag.active-tag{
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .filter-bar{
    display:flex;
    align-items:center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .filter-bar.hidden{
    display:none;
  }

  .filter-label{
    font-size: 13px;
    color: var(--muted);
  }

  .filter-chip{
    display:flex;
    align-items:center;
    gap: 8px;
    background: var(--primary-soft);
    border: 1px solid var(--primary);
    color: var(--primary);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 8px 6px 14px;
    border-radius: 999px;
  }

  .filter-chip button{
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .go-link{
    margin-top: auto;
    display: flex;
    align-items:center;
    justify-content:center;
    gap: 6px;
    text-decoration:none;
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    font-size: 13.5px;
    padding: 9px 12px;
    border-radius: 8px;
    transition: background .2s ease, transform .15s ease;
  }

  .go-link:hover{
    background: var(--primary-strong);
    transform: scale(1.02);
  }

  .empty-state{
    grid-column: 1 / -1;
    text-align:center;
    padding: 60px 20px;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
  }

  .empty-state b{ color: var(--primary); }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0 40px;
  }

  @media (max-width: 480px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
    header{ padding: 24px 5vw 18px; }
    main{ padding: 24px 5vw 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>KOLEKSI</h1>
    <div class="tagline">crotin.github.io</div>
  </div>
  <div class="controls">
    <button class="theme-toggle" id="themeToggle">
      <span class="dot" id="themeDot">☀️</span>
      <span id="themeLabel">Mode Terang</span>
    </button>
  </div>
</header>

<main>
  <div class="filter-bar hidden" id="filterBar">
    <span class="filter-label">Menampilkan tag:</span>
    <span class="filter-chip">
      <span id="filterChipText"></span>
      <button id="filterClearBtn" title="Hapus filter">&times;</button>
    </span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<script>
  /* =========================================================
     Data video diambil dari data.json (harus ada di folder yang sama).
     Format:
     [
       {
         "title": "Judul Video",
         "cast": ["Pemeran A", "Pemeran B"],
         "tags": ["Drama", "16+"],
         "cover": "https://link-menuju-gambar-cover.jpg",
         "url": "https://link-menuju-video.com"
       }
     ]
     Field "cover" opsional. Kalau tidak diisi/tidak bisa dimuat,
     akan otomatis fallback ke inisial judul seperti biasa.
  ========================================================= */

  const PER_PAGE = 10;
  let allVideos = [];
  let currentPage = 1;
  let activeTag = null;

  const grid = document.getElementById("grid");
  const pagination = document.getElementById("pagination");
  const filterBar = document.getElementById("filterBar");
  const filterChipText = document.getElementById("filterChipText");
  const filterClearBtn = document.getElementById("filterClearBtn");

  function getVisibleVideos(){
    if(!activeTag) return allVideos;
    return allVideos.filter(v => {
      const tags = Array.isArray(v.tags) ? v.tags : (v.tags ? [v.tags] : []);
      return tags.includes(activeTag);
    });
  }

  function setTagFilter(tag){
    activeTag = tag;
    currentPage = 1;
    if(activeTag){
      filterBar.classList.remove("hidden");
      filterChipText.textContent = activeTag;
    } else {
      filterBar.classList.add("hidden");
    }
    renderPage(1);
  }

  filterClearBtn.addEventListener("click", () => setTagFilter(null));

  function getInitials(title){
    return title
      .split(" ")
      .filter(Boolean)
      .slice(0,2)
      .map(w => w[0].toUpperCase())
      .join("");
  }

  function escapeAttr(str){
    return String(str).replace(/"/g, "&quot;");
  }

  function renderPage(page){
    currentPage = page;
    grid.innerHTML = "";

    if(!Array.isArray(allVideos) || allVideos.length === 0){
      grid.innerHTML = `<div class="empty-state">Tidak ada video ditemukan.<br>Pastikan <b>data.json</b> berada di folder yang sama dan berisi data yang valid.</div>`;
      pagination.innerHTML = "";
      return;
    }

    const visibleVideos = getVisibleVideos();

    if(visibleVideos.length === 0){
      grid.innerHTML = `<div class="empty-state">Tidak ada video dengan tag <b>${activeTag}</b>.</div>`;
      pagination.innerHTML = "";
      return;
    }

    const start = (page - 1) * PER_PAGE;
    const pageItems = visibleVideos.slice(start, start + PER_PAGE);

    pageItems.forEach(v => {
      const title = v.title || "Tanpa Judul";
      const cast = Array.isArray(v.cast) ? v.cast : (v.cast ? [v.cast] : []);
      const tags = Array.isArray(v.tags) ? v.tags : (v.tags ? [v.tags] : []);
      const url = v.url || "#";
      const cover = v.cover || "";

      const posterInner = cover
        ? `<img src="${escapeAttr(cover)}" alt="${escapeAttr(title)}" loading="lazy"
             onerror="this.closest('.poster').classList.remove('has-cover'); this.remove(); this.closest('.poster').insertAdjacentHTML('afterbegin','<span class=\\'initials\\'>${getInitials(title)}<\\/span>');">`
        : `<span class="initials">${getInitials(title)}</span>`;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="poster${cover ? " has-cover" : ""}">
          ${posterInner}
          <div class="play-hint"><span>&#9654;</span></div>
        </div>
        <div class="info">
          <h3>${title}</h3>
          <div class="meta-row"><b>Pemeran:</b> ${cast.length ? cast.join(", ") : "-"}</div>
          <div class="tags">
            ${tags.map(t => `<span class="tag${t === activeTag ? " active-tag" : ""}" data-tag="${escapeAttr(t)}">${t}</span>`).join("")}
          </div>
          <a class="go-link" href="${url}" target="_blank" rel="noopener">Lihat Video</a>
        </div>
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll(".tag").forEach(el => {
      el.addEventListener("click", () => {
        const tag = el.getAttribute("data-tag");
        setTagFilter(tag === activeTag ? null : tag);
      });
    });

    renderPagination();
  }

  function renderPagination(){
    const totalPages = Math.ceil(getVisibleVideos().length / PER_PAGE);
    pagination.innerHTML = "";

    if(totalPages <= 1) return;

    const prevBtn = document.createElement("button");
    prevBtn.className = "page-btn";
    prevBtn.textContent = "‹";
    prevBtn.disabled = currentPage === 1;
    prevBtn.addEventListener("click", () => renderPage(currentPage - 1));
    pagination.appendChild(prevBtn);

    for(let i = 1; i <= totalPages; i++){
      const btn = document.createElement("button");
      btn.className = "page-btn" + (i === currentPage ? " active" : "");
      btn.textContent = i;
      btn.addEventListener("click", () => renderPage(i));
      pagination.appendChild(btn);
    }

    const nextBtn = document.createElement("button");
    nextBtn.className = "page-btn";
    nextBtn.textContent = "›";
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.addEventListener("click", () => renderPage(currentPage + 1));
    pagination.appendChild(nextBtn);
  }

  fetch("data.json")
    .then(res => { if(!res.ok) throw new Error("no file"); return res.json(); })
    .then(data => {
      allVideos = Array.isArray(data) ? data : [];
      renderPage(1);
    })
    .catch(() => {
      grid.innerHTML = `<div class="empty-state">Gagal memuat <b>data.json</b>.<br>Pastikan file tersebut ada di folder yang sama dengan halaman ini.</div>`;
    });

  // ---------- THEME TOGGLE ----------
  const html = document.documentElement;
  const themeToggle = document.getElementById("themeToggle");
  const themeDot = document.getElementById("themeDot");
  const themeLabel = document.getElementById("themeLabel");

  function setTheme(mode){
    html.setAttribute("data-theme", mode);
    if(mode === "dark"){
      themeDot.textContent = "🌙";
      themeLabel.textContent = "Mode Gelap";
    } else {
      themeDot.textContent = "☀️";
      themeLabel.textContent = "Mode Terang";
    }
  }

  themeToggle.addEventListener("click", () => {
    const current = html.getAttribute("data-theme");
    setTheme(current === "light" ? "dark" : "light");
  });

  setTheme("light");
</script>

</body>
</html>
